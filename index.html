<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ge11yz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="fluid-overlay-styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚗</text></svg>">
  <style>
    /* ── Projects flip cards — matching Cormorant Garamond / DM Sans fonts ── */
    .flip-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
    }
    .flip-card {
      height: 320px;
      perspective: 1000px;
      cursor: pointer;
    }
    .flip-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.65s cubic-bezier(0.23, 1, 0.32, 1),
                  box-shadow 0.4s ease;
      transform-style: preserve-3d;
    }
    /* Selected pulse ring */
    .flip-card.selected .flip-card-inner::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 12px;
      border: 1.5px solid var(--accent, #fff);
      opacity: 0;
      animation: cardPulse 1.4s ease-out infinite;
      pointer-events: none;
      z-index: 10;
    }
    @keyframes cardPulse {
      0%   { opacity: 0.7; transform: scale(1);    }
      100% { opacity: 0;   transform: scale(1.06); }
    }
    .flip-card.flipped .flip-card-inner {
      transform: rotateY(180deg);
    }
    .flip-card.flipped:hover .flip-card-inner {
      transform: rotateY(180deg) translateY(-4px);
    }
    .flip-card-front,
    .flip-card-back {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
    }
    .flip-card-front {
      background: rgba(10, 10, 10, 0.85);
      border: none;
      display: flex;
      flex-direction: column;
    }
    .flip-card-back {
      background: rgba(12, 12, 12, 0.92);
      border: none;
      transform: rotateY(180deg);
      display: flex;
      flex-direction: column;
    }
    .flip-glow {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.2s ease;
    }
    /* Hover glow — very dim, slow fade */
    .flip-card:hover .flip-glow {
      opacity: 0.28;
    }
    .flip-card:hover .flip-card-inner {
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.7);
    }
    /* Cormorant Garamond — matching the header/section fonts */
    .flip-site-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 21px;
      font-weight: 400;
      font-style: italic;
      color: rgba(255,255,255,0.88);
      margin-bottom: 6px;
      line-height: 1.2;
      letter-spacing: 0.01em;
    }
    .flip-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: auto;
      padding-top: 8px;
      opacity: 0.48;
    }
    .flip-front-desc {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 300;
      color: rgba(255,255,255,0.35);
      line-height: 1.65;
      margin-bottom: 20px;
    }
    .flip-front-hint {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      letter-spacing: 0.14em;
      color: rgba(255,255,255,0.18);
      text-transform: uppercase;
    }
    .flip-front-content {
      position: relative;
      z-index: 1;
      padding: 28px;
      display: flex;
      flex-direction: column;
      height: 100%;
      box-sizing: border-box;
    }
    .flip-back-content {
      padding: 24px;
      display: flex;
      flex-direction: column;
      height: 100%;
      box-sizing: border-box;
    }
    .flip-back-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .flip-back-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .flip-back-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 300;
      background: rgba(255,255,255,0.06);
      border: none;
      color: rgba(255,255,255,0.3);
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
    }
    .flip-back-btn:hover { color: rgba(255,255,255,0.6); }
    .flip-notes {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
      padding-right: 2px;
    }
    .flip-note {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 300;
      color: rgba(255,255,255,0.45);
      line-height: 1.55;
    }
    .flip-note-dot {
      font-size: 9px;
      margin-top: 3px;
      flex-shrink: 0;
    }
    .flip-back-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .flip-visit-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 400;
      background: var(--accent);
      color: #000;
      border: none;
      padding: 6px 16px;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s;
      display: inline-block;
    }
    .flip-visit-btn:hover { opacity: 0.85; transform: scale(1.03); }
    .flip-card-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.18);
    }
  </style>
</head>
<body>
  <canvas></canvas>
  <div class="screen-flash" id="screenFlash"></div>

  <div class="page-content">
    <header>
      <div class="header-inner">
        <div class="logo" id="logo">
          <span class="logo-text">ge11y<span class="logo-z">z</span></span>
        </div>
        <p class="header-tagline">Selected Works</p>
      </div>
    </header>

    <section class="hero">
      <h1 class="hero-title">Ideas in motion,<br><em>projects in form.</em></h1>
      <p class="hero-sub">A collection of experiments, tools, and explorations at the intersection of technology and design. Click any card to see what's under the hood.</p>
    </section>

    <div class="divider"><hr></div>

    <section class="projects-section">
      <p class="section-label">Featured</p>
      <div class="flip-grid" id="flipGridFeatured"></div>
    </section>

    <div class="divider"><hr></div>

    <section class="projects-section">
      <p class="section-label">Community</p>
      <div class="flip-grid" id="flipGridCommunity"></div>
    </section>

    <div class="divider"><hr></div>

    <section class="projects-section">
      <p class="section-label">Ideas &amp; Projects</p>
      <div class="flip-grid" id="flipGridIdeas"></div>
    </section>

    <div class="divider"><hr></div>

    <footer>
      <div class="footer-inner">
        <p class="footer-text">© 2026 ge11yz</p>
        <p class="footer-text"><a href="https://x.com/GE11YZ" target="_blank" rel="noopener">@GE11YZ</a></p>
      </div>
    </footer>
  </div>

  <script src="webgl-fluid.js"></script>
  <script>
    var featured = [
      {
        name: 'rea1yze.com',
        tagline: 'AI Thought Mapping',
        url: 'https://rea1yze.com',
        accent: '#a8e8c8',
        desc: 'A 3D thought-mapping app where users type realizations and watch them form a neural network. AI surfaces patterns, values, and turning points over time.',
        notes: [
          'WebGL graceful fallback added — 2D mode when WebGL fails',
          'Demo content labeled &quot;— Sample content —&quot; with dashed border container',
          'Save button shows &quot;Saved ✓&quot; for 3 seconds after account creation',
          '&quot;Clear canvas&quot; button added to header with confirm dialog',
          '&quot;Skip&quot; and &quot;Sign in&quot; button contrast increased',
          '&quot;How it works&quot; card text overlap fixed',
        ],
      },
    ];

    var community = [
      {
        name: 'ogbe.art',
        tagline: 'Bitcoin Ordinal Art Portfolio',
        url: 'https://ogbe.art',
        accent: '#c8a8e8',
        desc: 'A curated portfolio showcasing Ordinal inscriptions across multiple collections. Features a WebGL fluid simulation background with a minimalist black card layout.',
        notes: [
          'WebGL fluid background — click logo for color burst',
          'Collections: EEGUN (111 pcs), IRO, TitWifNip, FLUX, For The Birds, INDICOLITE, and more',
          'Piece viewer with arrow nav, zoom, and pan across all collections',
          'Fonts enlarged — collection names at 18px, white text with gold glow on hover',
        ],
      },
      {
        name: 't0ph.art',
        tagline: 'Digital Artist',
        url: 'https://t0ph.art',
        accent: '#c8e8a8',
        desc: 'Digital artist — skulls and drip on-chain. Unique visual style blending dark aesthetics with digital craftsmanship.',
        notes: [
          'Skull and drip art on Bitcoin Ordinals',
          'Unique dark aesthetic with digital craftsmanship',
          'On-chain artwork, fully verifiable',
        ],
      },
    ];

    var ideas = [
      {
        name: 'aisess.xyz',
        tagline: 'AI URL Valuation Tool',
        url: 'https://aisess.xyz',
        accent: '#e8c8a8',
        desc: 'A URL analysis and valuation tool that extracts domain age, traffic signals, and keyword data to generate an estimated domain value.',
        notes: [
          'Assess button confirmed working (client-side mock valuation)',
          'Pricing section: &quot;Free during early access&quot; added',
          'Email waitlist and invite auth flow added',
          'Low-contrast placeholder text fixed',
        ],
      },
      {
        name: 'Ask Gelly',
        tagline: 'AI Sales Coaching',
        url: 'https://askge11y.com',
        accent: '#a8c8e8',
        desc: 'AI sales coaching for pest control companies. Helps sales teams practice calls, sharpen objections, and close more jobs.',
        notes: [
          'AI roleplay partner for pest control sales teams',
          'Voice and text coaching modes available',
          'Objection handling and closing techniques library',
        ],
      },
      {
        name: 'SWARM',
        tagline: 'Autonomous AI Swarm Builder',
        url: 'https://ge11y.github.io/swarm/',
        accent: '#e8a8b8',
        desc: 'Autonomous AI swarm build system — multiple AI agents coordinating to plan, build, and ship complete projects without human intervention.',
        notes: [
          'Multi-agent orchestration for project building',
          'Agents coordinate on planning, coding, testing, and deployment',
          'Built as an internal build tool for ge11yz',
        ],
      },
      {
        name: 'Team Portal',
        tagline: 'Collaboration Hub',
        url: 'https://ge11y.github.io/team-portal/',
        accent: '#a8e8e8',
        desc: 'Internal collaboration dashboard for managing inbound requests, project status, and team scheduling.',
        notes: [
          'Request submission form for project ideas and status tracking',
          'Schedule and time-slot scheduler for the team',
          'Minimalist eggshell tan and black aesthetic',
        ],
      },
      {
        name: 'OrdiMutants',
        tagline: 'Bitcoin NFT Collection',
        url: 'https://ge11y.github.io/ORDIMUTANTSDB/',
        accent: '#c8e8a8',
        desc: 'Bitcoin NFT collection on the Ordinals protocol. Full on-chain metadata and trait data.',
        notes: [
          'Ordinal inscription collection with on-chain traits',
          'Complete metadata and rarity data included',
        ],
      },
      {
        name: 'KORE Integrative Health',
        tagline: 'Wellness Platform',
        url: 'https://ge11y.github.io/CORE-INTEGRATIVE/',
        accent: '#e8d8a8',
        desc: 'Holistic wellness and whole-person care platform connecting practitioners with patients.',
        notes: [
          'Integrative health resources and practitioner directory',
          'Whole-person care approach with multiple modalities',
        ],
      },
    ];

    function renderGrid(containerId, projects) {
      var container = document.getElementById(containerId);
      if (!container) return;
      var html = '';
      projects.forEach(function(p, i) {
        var glowStyle = 'background:radial-gradient(ellipse at 30% 20%, ' + p.accent + ' 0%, transparent 60%)';
        html += ''
          + '<div class="flip-card" id="' + containerId + 'Card' + i + '" style="--accent:' + p.accent + '" onclick="flipCard(\'' + containerId + '\', ' + i + ', event)">'
          + '  <div class="flip-card-inner">'
          + '    <div class="flip-card-front">'
          + '      <div class="flip-glow" style="' + glowStyle + '"></div>'
          + '      <div class="flip-front-content">'
          + '        <div class="flip-site-name">' + p.name + '</div>'
          + '        <div class="flip-tagline" style="color:' + p.accent + '">' + p.tagline + '</div>'
          + '        <div class="flip-front-desc">' + p.desc + '</div>'
          + '        <div class="flip-front-hint">tap to see details &#8594;</div>'
          + '      </div>'
          + '    </div>'
          + '    <div class="flip-card-back">'
          + '      <div class="flip-back-content">'
          + '        <div class="flip-back-header">'
          + '          <div class="flip-back-title" style="color:' + p.accent + '">Summary</div>'
          + '          <button class="flip-back-btn" onclick="event.stopPropagation(); flipCard(\'' + containerId + '\', ' + i + ', event)">&#8592; Back</button>'
          + '        </div>'
          + '        <div class="flip-notes">';
        p.notes.forEach(function(note) {
          html += '          <div class="flip-note"><span class="flip-note-dot" style="color:' + p.accent + '">&#8226;</span><span>' + note + '</span></div>';
        });
        html += '        </div>'
          + '        <div class="flip-back-footer">'
          + '          <div class="flip-card-label">ge11yz ecosystem</div>'
          + '          <a href="' + p.url + '" class="flip-visit-btn" style="background:' + p.accent + '" onclick="event.stopPropagation()">Visit &#8594;</a>'
          + '        </div>'
          + '      </div>'
          + '    </div>'
          + '  </div>'
          + '</div>';
      });
      container.innerHTML = html;
    }

    renderGrid('flipGridFeatured', featured);
    renderGrid('flipGridCommunity', community);
    renderGrid('flipGridIdeas', ideas);

    function flipCard(gridId, i, e) {
      var card = document.getElementById(gridId + 'Card' + i);
      if (!card) return;
      var tag = e && e.target ? e.target.tagName : '';
      if (tag === 'A' || tag === 'BUTTON') return;
      document.querySelectorAll('.flip-card.selected').forEach(function(c) {
        if (c !== card) c.classList.remove('selected');
      });
      card.classList.toggle('flipped');
      if (card.classList.contains('flipped')) {
        card.classList.add('selected');
      } else {
        card.classList.remove('selected');
      }
    }

    // Logo color burst
    var palettes = [
      { SPLAT_HUE: 0.14, name: 'amber' },
      { SPLAT_HUE: 0.58, name: 'teal' },
      { SPLAT_HUE: 0.72, name: 'violet' },
      { SPLAT_HUE: 0.02, name: 'crimson' },
      { SPLAT_HUE: 0.50, name: 'cyan' },
      { SPLAT_HUE: 0.82, name: 'rose' },
      { SPLAT_HUE: 0.28, name: 'forest' },
      { SPLAT_HUE: 0.95, name: 'copper' },
    ];
    var paletteIndex = 0;

    function colorBurst() {
      for (var i = 0; i < 6; i++) {
        setTimeout(function(idx) {
          var hue = (config.SPLAT_HUE + idx * 0.12) % 1.0;
          var c = HSVtoRGB(hue, 0.9, 0.85);
          c.r *= 1.5; c.g *= 1.5; c.b *= 1.5;
          splat(0.3 + Math.random() * 0.4, 0.3 + Math.random() * 0.4, (Math.random() - 0.5) * 10000, (Math.random() - 0.5) * 10000, c);
        }.bind(null, i), i * 40);
      }
    }

    var logo = document.getElementById('logo');
    var flash = document.getElementById('screenFlash');

    logo.addEventListener('click', function() {
      paletteIndex = (paletteIndex + 1) % palettes.length;
      config.SPLAT_HUE = palettes[paletteIndex].SPLAT_HUE;
      logo.classList.remove('pulse');
      void logo.offsetWidth;
      logo.classList.add('pulse');
      flash.classList.remove('active');
      void flash.offsetWidth;
      flash.classList.add('active');
      colorBurst();
    });
  </script>
</body>
</html>
